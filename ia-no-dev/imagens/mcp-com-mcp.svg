<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="modelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="sysGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="mcpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g transform="scale(0.833, 1)">

  <rect width="960" height="480" rx="12" fill="#F8FAFC"/>

  <text x="480" y="32" text-anchor="middle" fill="#059669" font-size="20" font-weight="700" font-family="sans-serif">Com MCP</text>
  <text x="480" y="52" text-anchor="middle" fill="#94A3B8" font-size="13" font-family="sans-serif">1 barramento padronizado = 5 servidores</text>

  <!-- Models -->
  <rect x="30" y="76" width="80" height="22" rx="6" fill="url(#modelGrad)" filter="url(#shadow)"/>
  <text x="70" y="91" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="sans-serif">Claude</text>

  <rect x="30" y="166" width="80" height="22" rx="6" fill="url(#modelGrad)" filter="url(#shadow)"/>
  <text x="70" y="181" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="sans-serif">GPT</text>

  <rect x="30" y="256" width="80" height="22" rx="6" fill="url(#modelGrad)" filter="url(#shadow)"/>
  <text x="70" y="271" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="sans-serif">Gemini</text>

  <rect x="30" y="346" width="80" height="22" rx="6" fill="url(#modelGrad)" filter="url(#shadow)"/>
  <text x="70" y="361" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="sans-serif">DeepSeek</text>

  <rect x="30" y="436" width="80" height="22" rx="6" fill="url(#modelGrad)" filter="url(#shadow)"/>
  <text x="70" y="451" text-anchor="middle" fill="white" font-size="11" font-weight="600" font-family="sans-serif">Copilot</text>

  <text x="70" y="474" text-anchor="middle" fill="#94A3B8" font-size="10" font-family="sans-serif">Modelos</text>

  <!-- MCP Bar -->
  <rect x="350" y="62" width="120" height="398" rx="10" fill="url(#mcpGrad)" filter="url(#shadow)"/>
  <text x="410" y="270" text-anchor="middle" fill="white" font-size="16" font-weight="700" font-family="sans-serif" transform="rotate(-90, 410, 270)">MCP</text>

  <!-- Model-to-MCP lines -->
  <g stroke="#4F46E5" stroke-width="2.5">
    <line x1="110" y1="87" x2="350" y2="87"/>
    <line x1="110" y1="177" x2="350" y2="177"/>
    <line x1="110" y1="267" x2="350" y2="267"/>
    <line x1="110" y1="357" x2="350" y2="357"/>
    <line x1="110" y1="447" x2="350" y2="447"/>
  </g>

  <!-- Systems (5, aligned with models) -->
  <rect x="560" y="78" width="110" height="18" rx="4" fill="url(#sysGrad)" filter="url(#shadow)"/>
  <text x="615" y="92" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="sans-serif">PostgreSQL</text>

  <rect x="560" y="168" width="110" height="18" rx="4" fill="url(#sysGrad)" filter="url(#shadow)"/>
  <text x="615" y="182" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="sans-serif">GitHub</text>

  <rect x="560" y="258" width="110" height="18" rx="4" fill="url(#sysGrad)" filter="url(#shadow)"/>
  <text x="615" y="272" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="sans-serif">Slack</text>

  <rect x="560" y="348" width="110" height="18" rx="4" fill="url(#sysGrad)" filter="url(#shadow)"/>
  <text x="615" y="362" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="sans-serif">Jira</text>

  <rect x="560" y="438" width="110" height="18" rx="4" fill="url(#sysGrad)" filter="url(#shadow)"/>
  <text x="615" y="452" text-anchor="middle" fill="white" font-size="10" font-weight="600" font-family="sans-serif">Redis</text>

  <text x="615" y="474" text-anchor="middle" fill="#94A3B8" font-size="10" font-family="sans-serif">Sistemas</text>

  <!-- MCP-to-System lines -->
  <g stroke="#059669" stroke-width="2.5">
    <line x1="470" y1="87" x2="560" y2="87"/>
    <line x1="470" y1="177" x2="560" y2="177"/>
    <line x1="470" y1="267" x2="560" y2="267"/>
    <line x1="470" y1="357" x2="560" y2="357"/>
    <line x1="470" y1="447" x2="560" y2="447"/>
  </g>

  </g>
</svg>
