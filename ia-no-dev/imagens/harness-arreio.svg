<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="380" rx="12" fill="#F8FAFC"/>

  <!-- LLM Central Box -->
  <rect x="235" y="130" width="250" height="120" rx="12" fill="#4F46E5" filter="url(#shadow)"/>
  <text x="360" y="185" text-anchor="middle" fill="white" font-size="22" font-weight="700" font-family="sans-serif">LLM</text>
  <text x="360" y="210" text-anchor="middle" fill="#C7D2FE" font-size="12" font-family="sans-serif">Claude · GPT · Gemini</text>
  <text x="360" y="230" text-anchor="middle" fill="#C7D2FE" font-size="11" font-family="sans-serif">força bruta sem direção</text>

  <!-- AGENTS.md (rédea) - top -->
  <rect x="235" y="20" width="250" height="55" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="45" text-anchor="middle" fill="#92400E" font-size="14" font-weight="700" font-family="sans-serif">🧭 AGENTS.md</text>
  <text x="360" y="63" text-anchor="middle" fill="#92400E" font-size="11" font-family="sans-serif">A rédea — direciona o comportamento</text>
  <line x1="360" y1="75" x2="360" y2="130" stroke="#D97706" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Skills (bagagem) - left -->
  <rect x="20" y="140" width="190" height="48" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="115" y="162" text-anchor="middle" fill="#047857" font-size="13" font-weight="700" font-family="sans-serif">📦 Skills</text>
  <text x="115" y="178" text-anchor="middle" fill="#047857" font-size="10" font-family="sans-serif">A bagagem — conhecimento</text>
  <line x1="210" y1="164" x2="235" y2="170" stroke="#059669" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- MCP (conexoes) - left-bottom -->
  <rect x="20" y="240" width="190" height="48" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="115" y="262" text-anchor="middle" fill="#047857" font-size="13" font-weight="700" font-family="sans-serif">🔌 MCP</text>
  <text x="115" y="278" text-anchor="middle" fill="#047857" font-size="10" font-family="sans-serif">As conexões — liga ao mundo</text>
  <line x1="210" y1="260" x2="235" y2="210" stroke="#059669" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Hooks (freio) - right -->
  <rect x="510" y="140" width="190" height="48" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="605" y="162" text-anchor="middle" fill="#991B1B" font-size="13" font-weight="700" font-family="sans-serif">🛑 Hooks</text>
  <text x="605" y="178" text-anchor="middle" fill="#991B1B" font-size="10" font-family="sans-serif">O freio — bloqueia perigos</text>
  <line x1="510" y1="164" x2="485" y2="174" stroke="#DC2626" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Sub-agentes (cavalos) - bottom -->
  <rect x="235" y="305" width="250" height="55" rx="8" fill="#F1F5F9" stroke="#64748B" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="330" text-anchor="middle" fill="#475569" font-size="14" font-weight="700" font-family="sans-serif">🐴 Sub-agentes</text>
  <text x="360" y="348" text-anchor="middle" fill="#475569" font-size="11" font-family="sans-serif">Cavalos especializados — dividem a carga</text>
  <line x1="360" y1="305" x2="360" y2="250" stroke="#64748B" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Title -->
  <text x="360" y="20" text-anchor="middle" fill="#1E293B" font-size="16" font-weight="700" font-family="sans-serif" display="none">O Arreio (Harness) do Agente</text>
</svg>
