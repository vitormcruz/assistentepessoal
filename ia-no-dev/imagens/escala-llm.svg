<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="800" height="380" rx="12" fill="#F8FAFC"/>

  <!-- Left: Training column -->
  <rect x="25" y="25" width="360" height="330" rx="12" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2" filter="url(#shadow)"/>
  <rect x="25" y="25" width="360" height="40" rx="12" fill="#4F46E5"/>
  <rect x="25" y="49" width="360" height="16" fill="#4F46E5"/>
  <text x="205" y="52" text-anchor="middle" fill="white" font-size="16" font-weight="700" font-family="sans-serif">Treinamento</text>

  <text x="205" y="100" text-anchor="middle" fill="#1E293B" font-size="15" font-weight="700" font-family="sans-serif">📚 Trilhões de tokens</text>
  <text x="205" y="125" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">Equivalente a milhões de livros</text>
  <text x="205" y="145" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">Toda a internet, código público,</text>
  <text x="205" y="165" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">artigos, livros e conversas</text>

  <text x="205" y="210" text-anchor="middle" fill="#1E293B" font-size="15" font-weight="700" font-family="sans-serif">⏳ Meses de processamento</text>
  <text x="205" y="235" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">Milhares de GPUs rodando</text>
  <text x="205" y="255" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">24h por dia, por semanas ou meses</text>

  <text x="205" y="300" text-anchor="middle" fill="#1E293B" font-size="15" font-weight="700" font-family="sans-serif">💸 Dezenas a centenas de milhões</text>
  <text x="205" y="325" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">Custo de treinamento de um modelo frontier</text>

  <!-- Arrow between -->
  <rect x="395" y="165" width="40" height="30" rx="6" fill="#4F46E5"/>
  <text x="415" y="185" text-anchor="middle" fill="white" font-size="16" font-weight="700" font-family="sans-serif">→</text>

  <!-- Right: Model result -->
  <rect x="440" y="25" width="335" height="330" rx="12" fill="#ECFDF5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <rect x="440" y="25" width="335" height="40" rx="12" fill="#059669"/>
  <rect x="440" y="49" width="335" height="16" fill="#059669"/>
  <text x="607" y="52" text-anchor="middle" fill="white" font-size="16" font-weight="700" font-family="sans-serif">Resultado</text>

  <text x="607" y="100" text-anchor="middle" fill="#1E293B" font-size="15" font-weight="700" font-family="sans-serif">🧠 Bilhões de parâmetros</text>
  <text x="607" y="125" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">Representação comprimida</text>
  <text x="607" y="145" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">da linguagem humana</text>

  <text x="607" y="195" text-anchor="middle" fill="#1E293B" font-size="15" font-weight="700" font-family="sans-serif">⚡ Inferência instantânea</text>
  <text x="607" y="220" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">Prompt → resposta em segundos</text>
  <text x="607" y="240" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">Custa centavos por mil tokens</text>
  <text x="607" y="260" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">Roda em 1 GPU de consumo</text>

  <text x="607" y="310" text-anchor="middle" fill="#1E293B" font-size="15" font-weight="700" font-family="sans-serif">📦 Modelos abertos</text>
  <text x="607" y="335" text-anchor="middle" fill="#475569" font-size="12" font-family="sans-serif">Menores e especializados</text>
  <text x="607" y="352" text-anchor="middle" fill="#475569" font-size="11" font-family="sans-serif">são competitivos com custo muito menor</text>
</svg>
