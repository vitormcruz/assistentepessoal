<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="clientGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="#F8FAFC"/>

  <!-- MCP Client Box -->
  <rect x="30" y="50" width="280" height="180" rx="10" fill="url(#clientGrad)" filter="url(#shadow)"/>
  <text x="170" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700" font-family="sans-serif">MCP Client</text>
  <text x="170" y="130" text-anchor="middle" fill="#C7D2FE" font-size="12" font-family="sans-serif">Claude Desktop</text>
  <text x="170" y="150" text-anchor="middle" fill="#C7D2FE" font-size="12" font-family="sans-serif">ChatGPT · VS Code</text>
  <text x="170" y="170" text-anchor="middle" fill="#C7D2FE" font-size="12" font-family="sans-serif">Cursor · Copilot</text>

  <!-- MCP Server Box -->
  <rect x="490" y="50" width="280" height="180" rx="10" fill="url(#serverGrad)" filter="url(#shadow)"/>
  <text x="630" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700" font-family="sans-serif">MCP Server</text>
  <text x="630" y="135" text-anchor="middle" fill="#A7F3D0" font-size="12" font-family="sans-serif">Banco de Dados</text>
  <text x="630" y="155" text-anchor="middle" fill="#A7F3D0" font-size="12" font-family="sans-serif">API REST · Sistema de Arquivos</text>
  <text x="630" y="175" text-anchor="middle" fill="#A7F3D0" font-size="12" font-family="sans-serif">Ferramentas Customizadas</text>

  <!-- Arrow -->
  <line x1="316" y1="140" x2="484" y2="140" stroke="url(#arrowGrad)" stroke-width="3"/>
  <polygon points="484,140 472,132 472,148" fill="#059669"/>

  <!-- Arrow labels -->
  <text x="400" y="115" text-anchor="middle" fill="#7C3AED" font-size="11" font-weight="600" font-family="sans-serif">JSON-RPC</text>
  <text x="400" y="170" text-anchor="middle" fill="#64748B" font-size="10" font-family="sans-serif">resources · tools · prompts</text>

  <!-- Bottom annotation -->
  <text x="400" y="260" text-anchor="middle" fill="#64748B" font-size="11" font-family="sans-serif">Transporte: stdio (local) ou Streamable HTTP (remoto)</text>
</svg>
