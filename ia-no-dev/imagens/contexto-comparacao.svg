<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="320" rx="12" fill="#F8FAFC"/>

  <!-- Left box: Sem Contexto -->
  <rect x="20" y="30" width="330" height="270" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="30" width="330" height="36" rx="10" fill="#DC2626"/>
  <rect x="20" y="52" width="330" height="14" fill="#DC2626"/>
  <text x="185" y="55" text-anchor="middle" fill="white" font-size="14" font-weight="700" font-family="sans-serif">Contexto bruto</text>

  <!-- File pile icons -->
  <text x="185" y="100" text-anchor="middle" font-size="28" fill="#991B1B" font-family="sans-serif">📄📄📄📄📄</text>
  <text x="185" y="130" text-anchor="middle" font-size="28" fill="#991B1B" font-family="sans-serif">📄📄📄📄📄</text>
  <text x="185" y="160" text-anchor="middle" font-size="28" fill="#991B1B" font-family="sans-serif">📄📄📄📄📄</text>

  <text x="185" y="200" text-anchor="middle" fill="#991B1B" font-size="12" font-weight="600" font-family="sans-serif">200 arquivos, sem filtrar</text>
  <text x="185" y="220" text-anchor="middle" fill="#991B1B" font-size="11" font-family="sans-serif">Informação relevante</text>
  <text x="185" y="238" text-anchor="middle" fill="#991B1B" font-size="11" font-family="sans-serif">se perde no meio</text>

  <text x="185" y="275" text-anchor="middle" fill="#DC2626" font-size="16" font-weight="700" font-family="sans-serif">❌ Alucina</text>

  <!-- Arrow between -->
  <text x="360" y="170" text-anchor="middle" fill="#64748B" font-size="22" font-weight="700" font-family="sans-serif">→</text>

  <!-- Right box: Com Contexto -->
  <rect x="370" y="30" width="330" height="270" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <rect x="370" y="30" width="330" height="36" rx="10" fill="#059669"/>
  <rect x="370" y="52" width="330" height="14" fill="#059669"/>
  <text x="535" y="55" text-anchor="middle" fill="white" font-size="14" font-weight="700" font-family="sans-serif">Contexto curado</text>

  <!-- Filter icon -->
  <text x="535" y="95" text-anchor="middle" fill="#047857" font-size="15" font-weight="600" font-family="sans-serif">🔍 grep + compress → 3 arquivos</text>

  <!-- 3 relevant files -->
  <rect x="410" y="115" width="250" height="30" rx="6" fill="white" stroke="#059669" stroke-width="1.5"/>
  <text x="535" y="136" text-anchor="middle" fill="#047857" font-size="12" font-weight="600" font-family="sans-serif">📄 payment.py</text>

  <rect x="410" y="152" width="250" height="30" rx="6" fill="white" stroke="#059669" stroke-width="1.5"/>
  <text x="535" y="173" text-anchor="middle" fill="#047857" font-size="12" font-weight="600" font-family="sans-serif">📄 discount.py</text>

  <rect x="410" y="189" width="250" height="30" rx="6" fill="white" stroke="#059669" stroke-width="1.5"/>
  <text x="535" y="210" text-anchor="middle" fill="#047857" font-size="12" font-weight="600" font-family="sans-serif">📄 validator.py</text>

  <text x="535" y="250" text-anchor="middle" fill="#047857" font-size="11" font-family="sans-serif">Só o que importa + resumo</text>
  <text x="535" y="268" text-anchor="middle" fill="#047857" font-size="11" font-family="sans-serif">do resto do repositório</text>

  <text x="535" y="275" text-anchor="middle" fill="#059669" font-size="16" font-weight="700" font-family="sans-serif">✅ Resolve</text>
</svg>
