<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="800" height="340" rx="12" fill="#F8FAFC"/>

  <!-- Input box -->
  <rect x="30" y="100" width="180" height="120" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="145" text-anchor="middle" fill="#4F46E5" font-size="14" font-weight="700" font-family="sans-serif">Entrada</text>
  <text x="120" y="170" text-anchor="middle" fill="#6366F1" font-size="12" font-family="sans-serif">Prompt em texto</text>
  <text x="120" y="192" text-anchor="middle" fill="#6366F1" font-size="12" font-family="sans-serif">+ Contexto</text>

  <!-- Arrow 1 -->
  <line x1="215" y1="160" x2="285" y2="160" stroke="#4F46E5" stroke-width="3"/>
  <polygon points="285,160 275,153 275,167" fill="#4F46E5"/>

  <!-- LLM central box -->
  <rect x="290" y="60" width="220" height="200" rx="14" fill="#4F46E5" filter="url(#shadow)"/>
  <text x="400" y="110" text-anchor="middle" fill="white" font-size="18" font-weight="700" font-family="sans-serif">LLM</text>
  <text x="400" y="140" text-anchor="middle" fill="#C7D2FE" font-size="12" font-family="sans-serif">Rede neural treinada</text>
  <text x="400" y="162" text-anchor="middle" fill="#C7D2FE" font-size="12" font-family="sans-serif">sobre texto e código</text>
  <text x="400" y="195" text-anchor="middle" fill="#A5B4FC" font-size="11" font-family="sans-serif">Prediz o próximo token</text>
  <text x="400" y="215" text-anchor="middle" fill="#A5B4FC" font-size="11" font-family="sans-serif">Não é raciocínio</text>
  <text x="400" y="235" text-anchor="middle" fill="#A5B4FC" font-size="11" font-family="sans-serif">consciente</text>

  <!-- Arrow 2 -->
  <line x1="515" y1="160" x2="585" y2="160" stroke="#059669" stroke-width="3"/>
  <polygon points="585,160 575,153 575,167" fill="#059669"/>

  <!-- Output box -->
  <rect x="590" y="100" width="180" height="120" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="145" text-anchor="middle" fill="#059669" font-size="14" font-weight="700" font-family="sans-serif">Saída</text>
  <text x="680" y="170" text-anchor="middle" fill="#047857" font-size="12" font-family="sans-serif">Texto gerado</text>
  <text x="680" y="192" text-anchor="middle" fill="#047857" font-size="12" font-family="sans-serif">(completion)</text>

  <!-- Bottom row -->
  <text x="400" y="300" text-anchor="middle" fill="#64748B" font-size="12" font-family="sans-serif">Modelo estatístico de linguagem — não é consciência, não é banco de dados, não é busca</text>
  <text x="400" y="322" text-anchor="middle" fill="#94A3B8" font-size="11" font-family="sans-serif">Sabe o que estava nos dados de treino até a data de corte</text>
</svg>
